# file: settings.py
"""Application configuration using Pydantic BaseSettings.

This module defines a strongly‑typed, validated configuration object for the
microservice. It includes comprehensive docstrings, type hints, input
validation, and a safe logging configuration that avoids leaking secrets.
"""

import logging
from pathlib import Path
from typing import Literal

from pydantic import BaseSettings, Field, PostgresDsn, SQLiteDsn, validator

# --------------------------------------------------------------------------- #
# Logging configuration (does not expose secret values)
# --------------------------------------------------------------------------- #
logger = logging.getLogger(__name__)
if not logger.handlers:
    handler = logging.StreamHandler()
    formatter = logging.Formatter(
        "%(asctime)s %(levelname)s %(name)s %(message)s"
    )
    handler.setFormatter(formatter)
    logger.addHandler(handler)
    logger.setLevel(logging.INFO)


class Settings(BaseSettings):
    """All configurable settings for the microservice.

    The class pulls values from environment variables (or a ``.env`` file) and
    validates them at import time. Types are enforced by Pydantic, and any
    validation error is logged before being raised.
    """

    # FastAPI
    APP_NAME: str = Field(
        "bounty-service",
        env="APP_NAME",
        description="Human‑readable name of the FastAPI application.",
    )
    DEBUG: bool = Field(
        False,
        env="DEBUG",
        description="Enable debug mode (verbose logging, auto‑reload).",
    )

    # Database
    DB_URL: str = Field(
        ...,
        env="DATABASE_URL",
        description="Database connection URL (PostgreSQL or SQLite).",
    )
    DB_ECHO: bool = Field(
        False,
        env="DB_ECHO",
        description="Echo SQL statements (useful for debugging).",
    )

    # Scheduler
    POLL_INTERVAL_SECONDS: int = Field(
        300,
        env="POLL_INTERVAL_SECONDS",
        description="How often the scheduler polls for work (seconds).",
        ge=1,
    )
    SN_FEED_URL: str = Field(
        "https://api.stackexchange.com/2.3/feeds/sn",
        env="SN_FEED_URL",
        description="URL of the StackExchange feed.",
    )

    # HTTP client
    HTTP_TIMEOUT: int = Field(
        10,
        env="HTTP_TIMEOUT",
        description="Default request timeout for outbound HTTP calls (seconds).",
        ge=1,
    )

    # Logging
    LOG_LEVEL: Literal["DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"] = Field(
        "INFO",
        env="LOG_LEVEL",
        description="Global logging level for the service.",
    )
    LOG_FORMAT: str = Field(
        "%(asctime)s %(levelname)s %(name)s %(message)s",
        env="LOG_FORMAT",
        description="Log message format string.",
    )

    class Config:
        """Pydantic configuration for environment handling."""
        env_file = ".env"
        env_file_encoding = "utf-8"
        case_sensitive = False

    # --------------------------------------------------------------------- #
    # Validators
    # --------------------------------------------------------------------- #
    @validator("DB_URL")
    def validate_db_url(cls, v: str) -> str:
        """
        Validate the database URL.

        - SQLite URLs must be a valid ``SQLiteDsn``.
        - All other URLs are assumed to be PostgreSQL and must be a valid
          ``PostgresDsn``.
        - The value is returned unchanged for downstream consumption.

        Raises:
            ValueError: If the URL does not conform to the expected DSN format.
        """
        try:
            if v.lower().startswith("sqlite"):
                SQLiteDsn.validate(v)
            else:
                PostgresDsn.validate(v)
        except Exception as exc:
            logger.error("Invalid DATABASE_URL supplied: %s", v)
            raise ValueError(f"Invalid DATABASE_URL: {exc}") from exc
        return v

    @validator("LOG_LEVEL")
    def validate_log_level(cls, v: str) -> str:
        """
        Ensure the log level is one of the allowed literals.

        The logger is reconfigured to the new level at runtime.
        """
        logger.setLevel(v)
        return v

    @validator("SN_FEED_URL")
    def validate_sn_feed_url(cls, v: str) -> str:
        """
        Very lightweight URL validation – ensures the value starts with ``http``.
        """
        if not v.startswith(("http://", "https://")):
            logger.error("SN_FEED_URL must start with http(s): %s", v)
            raise ValueError("SN_FEED_URL must start with http:// or https://")
        return v


# --------------------------------------------------------------------------- #
# Export a singleton instance – creation errors are logged and re‑raised.
# --------------------------------------------------------------------------- #
try:
    settings = Settings()
    logger.info(
        "Configuration loaded: APP_NAME=%s, DEBUG=%s, LOG_LEVEL=%s",
        settings.APP_NAME,
        settings.DEBUG,
        settings.LOG_LEVEL,
    )
except Exception as exc:
    logger.exception("Failed to initialise Settings: %s", exc)
    raise
