# file: settings.py
"""Application configuration using Pydantic BaseSettings."""

import os
from pathlib import Path
from typing import Literal

from pydantic import BaseSettings, Field, PostgresDsn, SQLiteDsn, validator

class Settings(BaseSettings):
    """All configurable settings for the microservice."""
    # FastAPI
    APP_NAME: str = Field("bounty-service", env="APP_NAME")
    DEBUG: bool = Field(False, env="DEBUG")

    # Database
    DB_URL: str = Field(..., env="DATABASE_URL")
    DB_ECHO: bool = Field(False, env="DB_ECHO")

    # Scheduler
    POLL_INTERVAL_SECONDS: int = Field(300, env="POLL_INTERVAL_SECONDS")
    SN_FEED_URL: str = Field(
        "https://api.stackexchange.com/2.3/feeds/sn",
        env="SN_FEED_URL",
    )

    # HTTP client
    HTTP_TIMEOUT: int = Field(10, env="HTTP_TIMEOUT")

    # Logging
    LOG_LEVEL: Literal["DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"] = Field(
        "INFO", env="LOG_LEVEL"
    )
    LOG_FORMAT: str = Field(
        "%(asctime)s %(levelname)s %(name)s %(message)s", env="LOG_FORMAT"
    )

    class Config:
        env_file = ".env"
        env_file_encoding = "utf-8"

    @validator("DB_URL")
    def validate_db_url(cls, v: str) -> str:
        if v.startswith("sqlite"):
            SQLiteDsn.validate(v)
        else:
            PostgresDsn.validate(v)
        return v


settings = Settings()